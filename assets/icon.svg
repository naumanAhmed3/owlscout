  <!-- top cap -->
  <rect x="38" y="40" width="52" height="11" rx="5.5" fill="#D98A1C" />

  <!-- body -->
  <rect x="40" y="53" width="48" height="52" rx="14" fill="url(#body)" />

  <!-- base -->
  <rect x="46" y="106" width="36" height="10" rx="5" fill="#D98A1C" />

  <!-- inner glow + flame -->
  <circle cx="64" cy="79" r="19" fill="url(#core)" />
  <path d="M64 69 c6.5 5.5 7.6 12.2 0 18.8 c-7.6 -6.6 -6.5 -13.3 0 -18.8 z"
