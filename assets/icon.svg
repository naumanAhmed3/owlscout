    <radialGradient id="halo" cx="50%" cy="54%" r="52%">
      <stop offset="0" stop-color="#F5A623" stop-opacity="0.42" />
      <stop offset="1" stop-color="#F5A623" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- tile -->
  <rect width="128" height="128" rx="29" fill="#13161b" />
  <circle cx="64" cy="70" r="52" fill="url(#halo)" />

  <!-- handle -->
  <path d="M46 36 a18 16 0 0 1 36 0" fill="none" stroke="#D98A1C"
